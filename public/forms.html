<!DOCTYPE html>
<html>
<head>
  <title>Forms</title>
</head>
<body>
  <!-- Homepage Enquiry Form for Netlify Detection -->
  <form name="homepage-enquiry" data-netlify="true" netlify-honeypot="bot-field" hidden>
    <input type="hidden" name="form-name" value="homepage-enquiry" />
    <input name="bot-field" />
    <input name="fullName" />
    <input name="email" />
    <input name="contactNumber" />
    <input name="additionalNumber" />
    <input name="postcode" />
    <input name="mortgageAmount" />
    <input name="propertyValue" />
    <input name="currentLender" />
    <input name="mortgagePurpose" />
    <input name="mortgageLength" />
    <input name="combinedIncome" />
    <input name="agreedToTerms" />
  </form>

  <!-- Lender Enquiry Form for Netlify Detection -->
  <form name="lender-enquiry" data-netlify="true" netlify-honeypot="bot-field" hidden>
    <input type="hidden" name="form-name" value="lender-enquiry" />
    <input name="bot-field" />
    <input name="lenderName" />
    <input name="fullName" />
    <input name="email" />
    <input name="contactNumber" />
    <input name="additionalNumber" />
    <input name="postcode" />
    <input name="mortgageAmount" />
    <input name="propertyValue" />
    <input name="currentLender" />
    <input name="mortgagePurpose" />
    <input name="mortgageLength" />
    <input name="combinedIncome" />
    <input name="agreedToTerms" />
  </form>

  <!-- PPC Landing Page Form for Netlify Detection -->
  <form name="ppc-landing-enquiry" data-netlify="true" netlify-honeypot="bot-field" hidden>
    <input type="hidden" name="form-name" value="ppc-landing-enquiry" />
    <input name="bot-field" />
    <input name="fullName" />
    <input name="email" />
    <input name="contactNumber" />
    <input name="postcode" />
    <input name="mortgageAmount" />
    <input name="propertyValue" />
    <input name="currentLender" />
    <input name="mortgagePurpose" />
    <input name="agreedToTerms" />
    <!-- UTM Tracking Fields -->
    <input name="utm_source" />
    <input name="utm_medium" />
    <input name="utm_campaign" />
    <input name="utm_term" />
    <input name="utm_content" />
    <input name="gclid" />
    <input name="landing_page" />
    <input name="submission_time" />
  </form>
</body>
</html>
